[package]
name = "tempest-monitor"
version = "0.3.0"
license = "MIT"
edition = "2024"
default-run = "tempest-monitor"

[dependencies]
# ── Core TUI ──────────────────────────────────────────────────────────────────
crossterm = { version = "0.28", features = ["event-stream"] }
ratatui = "0.29"
sysinfo = "0.38"
battery = "0.7"
unicode-width = "0.2"
chrono = "0.4"
libc = "0.2"
regex = "1.10"
dirs = "6"

# ── Phase 8: Foundation & CLI ─────────────────────────────────────────────────
clap = { version = "4", features = ["derive"] }
config = "0.14"
serde = { version = "1", features = ["derive"] }
serde_yaml = "0.9"
thiserror = "2"
parking_lot = "0.12"
dashmap = "6"
futures = "0.3"

# ── Phase 9: Enhanced Process & Sockets ───────────────────────────────────────
netstat2 = "0.11"
tui-textarea = { version = "0.7", features = ["crossterm"] }

# ── Phase 10: Network Intelligence ───────────────────────────────────────────
pnet = "0.35"

# ── Phase 12: Persistence ────────────────────────────────────────────────────
tokio = { version = "1", features = ["full"] }
sqlx = { version = "0.8", features = ["sqlite", "runtime-tokio"] }

# ── Phase 13: Alerting ───────────────────────────────────────────────────────
notify-rust = "4"
log = "0.4"
env_logger = "0.11"

# ── Phase 14: Metrics Export ─────────────────────────────────────────────────
reqwest = { version = "0.12", features = ["json"] }
metrics = "0.24"
metrics-exporter-prometheus = "0.16"
serde_json = "1"

# ── Phase 15: Visualization ──────────────────────────────────────────────────
plotters = "0.3"

# ── Platform-specific ────────────────────────────────────────────────────────
[target.'cfg(target_os = "linux")'.dependencies]
procfs = "0.17"
nvml-wrapper = "0.10"
ethtool = "0.2"
